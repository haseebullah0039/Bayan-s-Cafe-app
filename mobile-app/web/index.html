<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="Bayans Cafe Digital Menu — Order your favourite food" />
    <title>Bayans Cafe</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
      }

      /* ── Desktop: show phone frame ── */
      @media (min-width: 500px) {
        body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background:
            radial-gradient(ellipse at 20% 20%, rgba(212,160,23,0.08) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, rgba(255,107,0,0.06) 0%, transparent 60%),
            #0a0a0a;
        }

        /* Phone outer frame */
        .phone-frame {
          position: relative;
          width: 393px;
          height: 852px;
          border-radius: 54px;
          background: #1a1a1a;
          box-shadow:
            0 0 0 2px #2a2a2a,
            0 0 0 4px #1a1a1a,
            0 30px 80px rgba(0,0,0,0.8),
            0 0 60px rgba(212,160,23,0.08),
            inset 0 0 0 1px rgba(255,255,255,0.05);
          padding: 14px;
          display: flex;
          flex-direction: column;
        }

        /* Notch / Dynamic Island */
        .phone-notch {
          position: absolute;
          top: 14px;
          left: 50%;
          transform: translateX(-50%);
          width: 120px;
          height: 34px;
          background: #0a0a0a;
          border-radius: 0 0 22px 22px;
          z-index: 10;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }
        .phone-notch::after {
          content: '';
          width: 12px;
          height: 12px;
          border-radius: 50%;
          background: #1a1a1a;
          border: 2px solid #2a2a2a;
        }

        /* Status bar */
        .phone-status {
          height: 48px;
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          padding: 10px 28px 0;
          font-size: 13px;
          font-weight: 600;
          color: #fff;
          z-index: 5;
          flex-shrink: 0;
        }
        .phone-status-time { letter-spacing: -0.3px; }
        .phone-status-icons {
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .phone-status-icons svg { fill: white; }

        /* Screen area */
        .phone-screen {
          flex: 1;
          border-radius: 40px;
          overflow: hidden;
          background: #0D0D0D;
          position: relative;
        }

        /* Side buttons */
        .phone-btn-left {
          position: absolute;
          left: -4px;
          top: 120px;
          width: 4px;
          height: 36px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
        }
        .phone-btn-left-2 {
          position: absolute;
          left: -4px;
          top: 172px;
          width: 4px;
          height: 70px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
        }
        .phone-btn-left-3 {
          position: absolute;
          left: -4px;
          top: 256px;
          width: 4px;
          height: 70px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
        }
        .phone-btn-right {
          position: absolute;
          right: -4px;
          top: 180px;
          width: 4px;
          height: 90px;
          background: #2a2a2a;
          border-radius: 0 2px 2px 0;
        }

        /* Bottom home indicator */
        .phone-home {
          height: 28px;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
        }
        .phone-home::after {
          content: '';
          width: 128px;
          height: 5px;
          background: rgba(255,255,255,0.25);
          border-radius: 100px;
        }

        /* App iframe fills screen */
        #root-container {
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        /* Brand label under phone */
        .phone-label {
          text-align: center;
          margin-top: 20px;
          color: rgba(255,255,255,0.15);
          font-size: 11px;
          letter-spacing: 3px;
          text-transform: uppercase;
        }
        .phone-label span { color: rgba(212,160,23,0.4); }
      }

      /* ── Mobile: full screen, no frame ── */
      @media (max-width: 499px) {
        .phone-frame {
          width: 100%;
          height: 100vh;
          border-radius: 0;
          background: #0D0D0D;
          padding: 0;
          box-shadow: none;
        }
        .phone-notch,
        .phone-status,
        .phone-home,
        .phone-btn-left,
        .phone-btn-left-2,
        .phone-btn-left-3,
        .phone-btn-right { display: none; }
        .phone-screen {
          border-radius: 0;
          height: 100vh;
        }
        .phone-label { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <!-- Hardware buttons -->
      <div class="phone-btn-left"></div>
      <div class="phone-btn-left-2"></div>
      <div class="phone-btn-left-3"></div>
      <div class="phone-btn-right"></div>

      <!-- Notch -->
      <div class="phone-notch"></div>

      <!-- Status bar -->
      <div class="phone-status">
        <span class="phone-status-time" id="clock">9:41</span>
        <div class="phone-status-icons">
          <!-- Signal -->
          <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
          <!-- Wifi -->
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.5a6 6 0 0 1 4.24 1.76L11 9a4 4 0 0 0-6 0L3.76 7.76A6 6 0 0 1 8 6zm0-4a9.5 9.5 0 0 1 6.72 2.78L13.3 6.2a7.5 7.5 0 0 0-10.6 0L1.28 4.78A9.5 9.5 0 0 1 8 2z" fill-rule="evenodd"/></svg>
          <!-- Battery -->
          <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1.5" fill="none"/><rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="white"/><path d="M23 4v4a2 2 0 0 0 0-4z"/></svg>
        </div>
      </div>

      <!-- App screen -->
      <div class="phone-screen">
        <div id="root-container">
          <div id="root"></div>
        </div>
      </div>

      <!-- Home indicator -->
      <div class="phone-home"></div>
    </div>

    <p class="phone-label">Bayans Cafe &nbsp;·&nbsp; <span>Powered by Digital Hujra</span></p>

    <script>
      // Live clock
      function updateClock() {
        const now = new Date();
        let h = now.getHours(), m = now.getMinutes();
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('clock').textContent =
          h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
      }
      updateClock();
      setInterval(updateClock, 10000);
    </script>
  </body>
</html>
